name: Daily Congress Stock Monitor

on:
  schedule:
    # Run daily at 13:00 UTC (9:00 AM EST)
    - cron: '0 13 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write # Allows the workflow to commit changes back to the repo

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yfinance python-dotenv

    - name: Run Monitor
      env:
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
        RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
      run: python monitor.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add alerts.json alert_history.json
        # Commit only if changes exist
        git diff-index --quiet HEAD || (git commit -m "Automated daily price alert update" && git push)
